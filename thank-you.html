<!DOCTYPE html>
<html class="dark" lang="de">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-W87P1Z4F6X"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-W87P1Z4F6X');
    </script>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Vielen Dank | Capital Council</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <style>
        body {
            background-color: #071326;
            color: #d7e3fe;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(20, 32, 51, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(141, 144, 161, 0.1);
            box-shadow: 0 0 40px rgba(29, 100, 242, 0.2);
        }

        .gradient-button {
            background: linear-gradient(135deg, #1D64F2 0%, #0047AB 100%);
            color: white !important;
            box-shadow: 0 10px 25px -5px rgba(29, 100, 242, 0.4);
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .gradient-button:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 20px 35px -5px rgba(29, 100, 242, 0.5);
        }
    </style>
</head>

<body>
    <div class="max-w-2xl w-full px-6 text-center">
        <div class="glass-card p-12 rounded-3xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-primary-container"></div>

            <div class="mb-8 flex justify-center">
                <div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center animate-bounce">
                    <span class="material-symbols-outlined text-4xl text-primary">check_circle</span>
                </div>
            </div>

            <h1 class="text-4xl md:text-5xl font-bold font-headline mb-6 tracking-tight">Termin bestätigt!</h1>
            <p class="text-lg text-on-surface-variant mb-10 leading-relaxed">
                Vielen Dank für Ihre Buchung. Wir haben Ihren Termin erhalten und freuen uns auf unser gemeinsames
                Strategie-Gespräch. Eine Bestätigung wurde an Ihre E-Mail-Adresse gesendet.
            </p>


        </div>
    </div>

    <!-- Analytics Tracking for the Booking Success -->
    <script>
        function trackConversion() {
            // Check for consent if you want to keep it compliant, or just fire it if the user wants it direct.
            // Since the user put GA in the head, they likely want it to fire.
            
            if (typeof gtag === 'function') {
                gtag('event', 'purchase', {
                    'transaction_id': 'booking_' + new Date().getTime(),
                    'value': 1.0,
                    'currency': 'EUR',
                    'items': [{
                        'item_name': 'Strategy Session',
                        'item_category': 'Service'
                    }]
                });
                console.log('Conversion tracked');
            }
        }

        document.addEventListener('DOMContentLoaded', trackConversion);
    </script>
</body>

</html>
