<!DOCTYPE html>
<html class="dark" lang="de">
<head>
    <link rel="icon" type="image/png" href="/favicon.png">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-W87P1Z4F6X"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-W87P1Z4F6X');
    </script>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Alles erledigt | Capital Council</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        :root { --mouse-x: 50%; --mouse-y: 50%; }

        body {
            background-color: #071326;
            color: #d7e3fe;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .font-headline { font-family: 'Space Grotesk', sans-serif; }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image:
              linear-gradient(to right, rgba(29, 100, 242, 0.05) 1px, transparent 1px),
              linear-gradient(to bottom, rgba(29, 100, 242, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .glass-card {
            background: rgba(20, 32, 51, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(141, 144, 161, 0.1);
            box-shadow: 0 0 40px rgba(29, 100, 242, 0.15);
        }

        /* Check animation */
        .check-ring {
            animation: pulse-ring 2.5s ease-in-out infinite; border-color: rgba(179,197,255,0.3);
        }
        @keyframes pulse-ring {
            0%, 100% { box-shadow: 0 0 0 0 rgba(179, 197, 255, 0.25); }
            50%       { box-shadow: 0 0 0 14px rgba(29, 100, 242, 0); }
        }

        .check-bg {
            animation: scale-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
            transform-origin: center;
        }
        @keyframes scale-in {
            from { transform: scale(0); opacity: 0; }
            to   { transform: scale(1); opacity: 1; }
        }

        .checkmark-path {
            stroke-dasharray: 36;
            stroke-dashoffset: 36;
            animation: draw-check 0.5s ease 0.45s both;
        }
        @keyframes draw-check {
            to { stroke-dashoffset: 0; }
        }

        /* Staggered fade-up */
        .fade-up {
            opacity: 0;
            transform: translateY(18px);
            animation: fadeUp 0.55s ease forwards;
        }
        .fade-up:nth-child(1) { animation-delay: 0.05s; }
        .fade-up:nth-child(2) { animation-delay: 0.2s; }
        .fade-up:nth-child(3) { animation-delay: 0.35s; }
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="fixed inset-0 z-[-1] pointer-events-none">
      <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-container rounded-full blur-[120px] opacity-20"></div>
      <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-surface-tint rounded-full blur-[150px] opacity-20"></div>
    </div>
    <main class="relative w-full flex items-center justify-center px-6 py-16">
        <div class="max-w-lg w-full text-center space-y-8 relative z-10">

            <!-- Animated Checkmark -->
            <div class="fade-up flex justify-center">
                <div class="check-ring w-20 h-20 rounded-full border border-[rgba(179,197,255,0.3)] bg-[rgba(179,197,255,0.06)] flex items-center justify-center">
                    <div class="check-bg w-14 h-14 rounded-full bg-[rgba(179,197,255,0.12)] flex items-center justify-center" style="box-shadow: 0 0 24px rgba(179,197,255,0.2); border: 1px solid rgba(179,197,255,0.25);">
                        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <polyline class="checkmark-path" points="5,14 11,20 23,8" stroke="#b3c5ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Headline + Subline -->
            <div class="fade-up space-y-4">
                <h1 class="font-headline text-4xl md:text-5xl font-bold tracking-tight" style="color: #d7e3fe;">
                    Alles erledigt!
                </h1>
                <p class="font-headline text-xl md:text-2xl font-medium" style="color: #b3c5ff;">
                    Dein Videokurs wartet auf dich.
                </p>
            </div>

            <!-- Email Hint Card -->
            <div class="fade-up glass-card rounded-2xl px-7 py-5 flex items-center gap-4 text-left">
                <div class="flex-none w-9 h-9 rounded-full flex items-center justify-center" style="background: rgba(179,197,255,0.08); border: 1px solid rgba(179,197,255,0.2);">
                    <span class="material-symbols-outlined" style="color: #b3c5ff; font-size: 18px;">mail</span>
                </div>
                <p class="text-sm leading-snug" style="color: #c3c6d8;">
                    In wenigen Minuten sollte eine <span style="color: #d7e3fe; font-weight: 500;">Email</span> mit deinem Kurslink in deinem Postfach sein. Schau auch kurz im Spam-Ordner nach falls du nichts siehst.
                </p>
            </div>

        </div>
    </main>

    <script>
        document.addEventListener('mousemove', (e) => {
            document.documentElement.style.setProperty('--mouse-x', e.clientX + 'px');
            document.documentElement.style.setProperty('--mouse-y', e.clientY + 'px');
        });

        if (typeof gtag === 'function') {
            gtag('event', 'purchase', {
                transaction_id: 'booking_' + Date.now(),
                value: 1.0,
                currency: 'EUR',
                items: [{ item_name: 'Strategy Session', item_category: 'Service' }]
            });
        }
    </script>
</body>
</html>
